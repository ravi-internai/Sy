<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SpecialYou — FG Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --crimson: #A31545;
  --crimson-dark: #7d1035;
  --crimson-light: #f9eaee;
  --crimson-mid: #f0d0da;
  --bg: #fdf8f9;
  --white: #ffffff;
  --border: #ecd6dd;
  --text: #2d1a20;
  --text-mid: #8a6070;
  --text-light: #c4a0b0;
  --success: #2d7a4f;
  --success-bg: #eaf5ee;
  --warn: #c0440a;
  --warn-bg: #fdf0ea;
  --shadow-sm: 0 1px 4px rgba(163,21,69,0.07);
  --shadow-md: 0 4px 20px rgba(163,21,69,0.10);
  --shadow-lg: 0 8px 40px rgba(163,21,69,0.14);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
  --radius: 12px;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 60px;
}

/* ── HEADER ── */
header {
  width: 100%;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-img {
  height: 40px;
  width: auto;
}

.header-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
}

.header-title {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--crimson);
}

.header-sub {
  font-size: 10px;
  color: var(--text-light);
  letter-spacing: 0.5px;
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.clock {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-mid);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--crimson);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

/* ── WRAPPER ── */
.wrapper {
  width: 100%;
  max-width: 460px;
  padding: 20px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  animation: slideUp 0.4s ease both;
}

.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 10px 16px;
  background: var(--crimson-light);
  border-bottom: 1px solid var(--crimson-mid);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--crimson);
}

.card-badge {
  font-size: 10px;
  color: var(--text-light);
  letter-spacing: 0.5px;
}

.card-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── SCANNER ── */
.scanner-wrap {
  position: relative;
  background: #111;
  border-radius: 0;
  overflow: hidden;
}

#reader {
  width: 100% !important;
  border: none !important;
  border-radius: 0 !important;
}

#reader video { width: 100% !important; }

#reader__scan_region { background: #111 !important; }

#reader__dashboard {
  background: var(--white) !important;
  border-top: 1px solid var(--border) !important;
  padding: 10px !important;
}

#reader__dashboard_section_csr button,
#reader__dashboard_section_swaplink {
  background: var(--crimson) !important;
  color: white !important;
  border: none !important;
  border-radius: 8px !important;
  font-family: var(--sans) !important;
  font-weight: 600 !important;
  font-size: 13px !important;
  padding: 10px 20px !important;
  cursor: pointer !important;
  letter-spacing: 0.5px !important;
}

#reader__filescan_input { display: none !important; }

/* Scan corner accents */
.scan-frame {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}

.scan-frame::before,
.scan-frame::after,
.sf-bl::before,
.sf-br::before {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  border-color: rgba(163,21,69,0.8);
  border-style: solid;
}

.scan-frame::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
.scan-frame::after  { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
.sf-bl::before { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
.sf-br::before { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

/* ── FIELDS ── */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-mid);
}

input, select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 400;
  padding: 11px 14px;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
}

input:focus, select:focus {
  border-color: var(--crimson);
  box-shadow: 0 0 0 3px rgba(163,21,69,0.10);
  background: var(--white);
}

input::placeholder { color: var(--text-light); }

.select-wrap { position: relative; }
.select-arrow {
  position: absolute;
  right: 13px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--crimson);
  font-size: 11px;
}

/* ── FINAL EAN ── */
.final-ean-box {
  background: var(--crimson-light);
  border: 1.5px solid var(--crimson-mid);
  border-radius: 8px;
  padding: 12px 14px;
  min-height: 48px;
  display: flex;
  align-items: center;
  transition: all 0.2s;
}

.final-ean-box.has-value {
  background: var(--white);
  border-color: var(--crimson);
  box-shadow: 0 0 0 3px rgba(163,21,69,0.08);
}

.final-ean-value {
  font-family: 'Courier New', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--crimson);
  letter-spacing: 2px;
  word-break: break-all;
}

.final-ean-empty {
  font-size: 13px;
  color: var(--text-light);
}

/* ── TRANSACTION TOGGLE ── */
.toggle-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.toggle-btn {
  padding: 13px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text-mid);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.toggle-btn:hover { border-color: var(--crimson); color: var(--crimson); }

.toggle-btn.active-in {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
  box-shadow: 0 0 0 3px rgba(45,122,79,0.08);
}

.toggle-btn.active-out {
  background: var(--warn-bg);
  border-color: var(--warn);
  color: var(--warn);
  box-shadow: 0 0 0 3px rgba(192,68,10,0.08);
}

/* ── QTY ── */
.qty-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: end;
}

.qty-btns {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.qty-btn {
  width: 40px; height: 26px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--crimson);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: all 0.1s;
  line-height: 1;
}

.qty-btn:hover { background: var(--crimson-light); border-color: var(--crimson); }
.qty-btn:active { transform: scale(0.93); }

/* ── SAVE BUTTON ── */
.save-btn {
  width: 100%;
  padding: 17px;
  background: var(--crimson);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(163,21,69,0.30);
  position: relative;
  overflow: hidden;
  animation: slideUp 0.4s ease 0.2s both;
}

.save-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.5s;
}

.save-btn:hover { background: var(--crimson-dark); box-shadow: 0 6px 24px rgba(163,21,69,0.40); transform: translateY(-1px); }
.save-btn:hover::after { transform: translateX(100%); }
.save-btn:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(163,21,69,0.25); }
.save-btn:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; box-shadow: none; transform: none; }

/* ── HEART DIVIDER ── */
.heart-divider {
  text-align: center;
  color: var(--crimson-mid);
  font-size: 14px;
  letter-spacing: 8px;
  margin: -4px 0;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 100px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 22px;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--warn); color: var(--warn); }

</style>
</head>

    <div class="header-divider"></div>
    <div>
      <div class="header-title">FG Scanner</div>
      <div class="header-sub">Inventory Control</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="live-dot"></div>
  </div>
</header>

<div class="wrapper">

  <!-- SCANNER -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">📷 Barcode Scanner</div>
      <div class="card-badge">Tap to activate</div>
    </div>
    <div style="position:relative;">
      <div class="scan-frame">
        <div class="sf-bl"></div>
        <div class="sf-br"></div>
      </div>
      <div id="reader"></div>
    </div>
  </div>

  <div class="heart-divider">♥ &nbsp; ♥ &nbsp; ♥</div>

  <!-- EAN DETAILS -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">🔢 Product EAN</div>
      <div class="card-badge">Step 01</div>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Raw EAN Code</label>
        <input id="ean" placeholder="Scan barcode or type here…" oninput="generateFinalEAN()">
      </div>
      <div class="field">
        <label>Platform</label>
        <div class="select-wrap">
          <select id="platform" onchange="generateFinalEAN()">
            <option value="">— Select Platform —</option>
            <option>Swiggy/Instamart</option>
            <option>FBA</option>
            <option>Zepto</option>
            <option>Myntra</option>
            <option>FBF</option>
            <option>Blinkit</option>
            <option>GoGear</option>
          </select>
          <div class="select-arrow">▾</div>
        </div>
      </div>
      <div class="field">
        <label>Final EAN (Auto-generated)</label>
        <div class="final-ean-box" id="final-ean-box">
          <span class="final-ean-empty" id="final-ean-display">Awaiting EAN &amp; platform…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- TRANSACTION -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">⚡ Transaction</div>
      <div class="card-badge">Step 02</div>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Direction</label>
        <div class="toggle-row">
          <button class="toggle-btn active-in" id="btn-in" onclick="setTransaction('IN')">▲ &nbsp;IN</button>
          <button class="toggle-btn" id="btn-out" onclick="setTransaction('OUT')">▼ &nbsp;OUT</button>
        </div>
      </div>
      <div class="field">
        <label>Quantity</label>
        <div class="qty-row">
          <input id="qty" type="number" placeholder="0" min="1">
          <div class="qty-btns">
            <button class="qty-btn" onclick="adjustQty(1)">+</button>
            <button class="qty-btn" onclick="adjustQty(-1)">−</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveData()">♥ &nbsp; Save Record</button>

</div>

<!-- hidden inputs -->
<input id="final_ean" type="hidden">
<input id="transaction" type="hidden" value="IN">

<div class="toast" id="toast"></div>

<script>

const scriptURL = "https://script.google.com/a/macros/specialyou.in/s/AKfycbxpKsv5eEuMjZi9uJkpO2pKXSWHY-K7qQZ-5IZEtp8lvbaRmVOK2MsPINV0DWlfW0LZ/exec";

// Clock
function tick() {
  document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8);
}
setInterval(tick, 1000); tick();

// Transaction
function setTransaction(val) {
  document.getElementById('transaction').value = val;
  document.getElementById('btn-in').className  = 'toggle-btn' + (val === 'IN'  ? ' active-in'  : '');
  document.getElementById('btn-out').className = 'toggle-btn' + (val === 'OUT' ? ' active-out' : '');
}

// Qty
function adjustQty(d) {
  const el = document.getElementById('qty');
  el.value = Math.max(0, (parseInt(el.value) || 0) + d);
}

// Final EAN
function generateFinalEAN() {
  const ean = document.getElementById('ean').value.trim();
  const platform = document.getElementById('platform').value;
  let final = '';

  if (ean && platform) {
    if (['FBF','Myntra','Blinkit','GoGear'].includes(platform)) final = ean;
    else if (platform === 'Swiggy/Instamart') final = ean + '-I';
    else if (platform === 'FBA') final = ean + '-F';
    else final = ean + '-' + platform.charAt(0);
  }

  document.getElementById('final_ean').value = final;
  const box = document.getElementById('final-ean-box');
  const disp = document.getElementById('final-ean-display');

  if (final) {
    box.className = 'final-ean-box has-value';
    disp.className = 'final-ean-value';
    disp.textContent = final;
  } else {
    box.className = 'final-ean-box';
    disp.className = 'final-ean-empty';
    disp.textContent = ean ? 'Select a platform…' : 'Awaiting EAN & platform…';
  }
}

// Toast
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { el.className = 'toast' + (type ? ' ' + type : ''); }, 2800);
}

// Save
function saveData() {
  const ean = document.getElementById('ean').value.trim();
  const platform = document.getElementById('platform').value;
  const qty = document.getElementById('qty').value.trim();
  const final_ean = document.getElementById('final_ean').value;

  if (!ean)      return toast('EAN code required', 'error');
  if (!platform) return toast('Select a platform', 'error');
  if (!qty || +qty <= 0) return toast('Enter quantity', 'error');

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  fetch(scriptURL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      ean, platform, final_ean,
      sku_name: '', sku_code: '',
      transaction: document.getElementById('transaction').value,
      qty
    })
  })
  .then(() => {
    toast('✓ Record saved!', 'success');
    document.getElementById('qty').value = '';
  })
  .catch(() => toast('Network error — try again', 'error'))
  .finally(() => {
    btn.disabled = false;
    btn.innerHTML = '♥ &nbsp; Save Record';
  });
}

// Scanner
function onScanSuccess(text) {
  document.getElementById('ean').value = text;
  generateFinalEAN();
  if (navigator.vibrate) navigator.vibrate(60);
}

new Html5QrcodeScanner('reader', { fps: 10, qrbox: 220 }).render(onScanSuccess);

</script>
</body>
